name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "
          import re
          m = re.search(r\"'CFBundleVersion':\s*'([^']+)'\", open('setup.py').read())
          print(m.group(1))
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Convert icon.icns to icon.ico
        run: |
          sudo apt-get update -q
          sudo apt-get install -y icnsutils
          pip install Pillow
          icns2png -x icon.icns
          python3 << 'EOF'
          from PIL import Image
          import glob, os
          pngs = sorted(glob.glob('icon_*x*x32.png'), key=os.path.getsize, reverse=True)
          if pngs:
              img = Image.open(pngs[0]).convert('RGBA')
              img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
              print(f'Created icon.ico from {pngs[0]}')
          else:
              print('WARNING: No PNG found, icon.ico not created')
          EOF

      - name: Upload icon.ico
        uses: actions/upload-artifact@v4
        with:
          name: windows-icon
          path: icon.ico
          if-no-files-found: warn

  build-macos:
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyqtgraph numpy py2app

      - name: Build with py2app
        run: arch -arm64 python setup.py py2app

      - name: Create DMG
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          mkdir -p dmg_staging
          cp -r dist/SerialMonitor.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "SerialMonitor" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "dist/SerialMonitor-${VERSION}-macOS.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/SerialMonitor-*-macOS.dmg

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install PyQt6 pyserial pyqtgraph numpy pyinstaller

      - name: Download icon.ico
        uses: actions/download-artifact@v4
        with:
          name: windows-icon
        continue-on-error: true

      - name: Build exe with PyInstaller
        run: pyinstaller build_windows.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$VERSION" installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/SerialMonitor-*-Windows.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            ## Serial Monitor ${{ needs.prepare.outputs.version }}

            ### ダウンロード / Download
            | プラットフォーム | ファイル |
            |---|---|
            | macOS (Apple Silicon) | `SerialMonitor-${{ needs.prepare.outputs.version }}-macOS.dmg` |
            | Windows (x64) | `SerialMonitor-${{ needs.prepare.outputs.version }}-Windows.exe` |
          files: |
            SerialMonitor-*-macOS.dmg
            SerialMonitor-*-Windows.exe
